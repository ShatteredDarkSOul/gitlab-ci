name: Build and Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/shattereddarksoul/gitlab-ci:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted  # INI YANG AKAN MEMERINTAH VM KAMU
    steps:
      - name: Pull and Run Container
        run: |
          sudo docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
          sudo docker pull ghcr.io/shattereddarksoul/gitlab-ci:latest
          sudo docker stop gitlabCiContainer || true
          sudo docker rm gitlabCiContainer || true
          sudo docker run -d -p 3000:3000 --name gitlabCiContainer ghcr.io/shattereddarksoul/gitlab-ci:latest
