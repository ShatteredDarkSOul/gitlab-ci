name: Docker Build Test

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          echo "Memulai build image di GitHub Actions..."
          docker build -t gitlab-ci-app .
          echo "Build berhasil!"
